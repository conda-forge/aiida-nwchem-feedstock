{% set name = "aiida-nwchem" %}
{% set version = "3.0.1" %}
{% set build = 0 %}
{% set name_code = name + ".code" %}
{% set python_min = "3.10" %}

package:
  name: {{ name }}.meta
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aiida_nwchem-{{ version }}.tar.gz
  sha256: 9c9c13b5e46e3b94c65ce4f0f3391bd4afeb854046918c45ebff67b12ecb0373

build:
  number: {{ build }}
  noarch: python

requirements:
  run:
  - {{ pin_subpackage(name, exact=True) }}
  - {{ pin_subpackage(name_code, exact=True) }}

outputs:

  - name:  {{ name }}
    build:
      noarch: python
      script: 'python -m pip install . --no-deps --ignore-installed -vvv '
    requirements:
      host:
        - pip
        - flit-core >=3.4,<4
        - python {{ python_min }}
      run:
        - aiida-core.atomic_tools >=2.0,<3
        - numpy
        - python >={{ python_min }}
      run_constrained:
        - {{ name_code }} =={{ version }}
    test:
      imports:
        - aiida_nwchem
      commands:
        - pip check
      requires:
        - pip
        - python {{ python_min }}
  
  - name: {{ name_code }}
    build:
      noarch: python
    requirements:
      run:
        - nwchem =7
    test:
      commands:
        - which nwchem

about:
  home: https://github.com/aiidateam/aiida-nwchem
  summary: The official AiiDA plugin for NWChem
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - mbercx
    - chrisjsewell
